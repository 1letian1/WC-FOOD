name: shike-ordering

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-shike_ordering}
      MYSQL_USER: ${DB_USERNAME:-shike}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes: [mysql-data:/var/lib/mysql]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      TZ: Asia/Shanghai
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes: [redis-data:/data]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shike-ordering-server:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DEFAULT_SHOP_ID: ${DEFAULT_SHOP_ID:-1}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-shike_ordering}
      DB_USERNAME: ${DB_USERNAME:-shike}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      USER_SESSION_TTL: ${USER_SESSION_TTL:-7d}
      MERCHANT_SESSION_TTL: ${MERCHANT_SESSION_TTL:-12h}
      WECHAT_APP_ID: ${WECHAT_APP_ID:?set WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?set WECHAT_APP_SECRET}
      UPLOAD_PATH: /app/uploads
      PUBLIC_FILE_BASE_URL: https://${DOMAIN:?set DOMAIN}/files
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SWAGGER_ENABLED: "false"
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      TZ: Asia/Shanghai
    expose: ["8080"]
    volumes: [uploads:/app/uploads]
    networks: [backend]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/common/health | grep '\"code\":0'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      TZ: Asia/Shanghai
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - uploads:/srv/uploads:ro
    networks: [backend]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  uploads:
